bundle:
  name: retail-supply-chain-digital-twin-graphrag

include:
  - resources/*.yml

variables:
  environment:
    description: Deployment environment name.

  catalog_name:
    description: Unity Catalog catalog name.

  bronze_schema:
    description: Bronze schema name.

  silver_schema:
    description: Silver schema name.

  gold_schema:
    description: Gold schema name.

  monitoring_schema:
    description: Monitoring schema name.

  event_hub_secret_scope:
    description: Databricks Key Vault-backed secret scope name.

  event_hub_connection_secret_key:
    description: Azure Key Vault secret key for Event Hub consumer connection string.

  event_hub_namespace:
    description: Event Hubs fully qualified namespace.

  event_hub_orders_name:
    description: Orders Event Hub name.

  event_hub_inventory_name:
    description: Inventory Event Hub name.

  event_hub_shipments_name:
    description: Shipments Event Hub name.

  event_hub_supplier_performance_name:
    description: Supplier performance Event Hub name.

  event_hub_orders_consumer_group:
    description: Orders consumer group.

  event_hub_inventory_consumer_group:
    description: Inventory consumer group.

  event_hub_shipments_consumer_group:
    description: Shipments consumer group.

  event_hub_supplier_performance_consumer_group:
    description: Supplier performance consumer group.

targets:
  dev:
    mode: development
    default: true
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}